<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXCHAT // INITIALIZE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff00;
            --cyber-blue: #00f0ff;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --text-color: #c0c0c0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Share Tech Mono', monospace;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
        header {
            border-bottom: 2px solid var(--neon-green);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.15);
        }
        .logo {
            font-size: 24px;
            color: var(--neon-green);
            text-decoration: text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 2px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .logo:hover {
            color: var(--cyber-blue);
            text-shadow: 0 0 15px var(--cyber-blue);
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-btn {
            color: var(--cyber-blue);
            text-decoration: none;
            border: 1px solid var(--cyber-blue);
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
        }
        .nav-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px var(--cyber-blue);
            transform: translateY(-2px);
        }
        .lang-container {
            position: relative;
            display: inline-block;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px var(--neon-green);
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            z-index: 1000;
            min-width: 120px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }
        .lang-dropdown button {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-dropdown button:hover {
            background: rgba(0, 255, 0, 0.2);
            color: var(--neon-green);
        }
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .form-card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.1);
            position: relative;
        }
        .form-title {
            font-size: 28px;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            color: var(--cyber-blue);
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            background: #000;
            border: 1px solid rgba(0, 240, 255, 0.5);
            padding: 12px;
            color: var(--neon-green);
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            color: var(--cyber-blue);
            font-size: 15px;
            margin-top: 15px;
        }
        .checkbox-group input {
            cursor: pointer;
            accent-color: var(--neon-green);
            width: 18px;
            height: 18px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1.5px;
            margin-top: 15px;
        }
        .submit-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px var(--neon-green);
        }
        .pow-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
        }
        .pow-text {
            color: var(--neon-green);
            font-size: 18px;
            margin-bottom: 15px;
            text-shadow: 0 0 8px var(--neon-green);
        }
        .pow-terminal {
            width: 100%;
            height: 150px;
            background: #000;
            border: 1px solid var(--cyber-blue);
            padding: 10px;
            font-size: 12px;
            color: var(--cyber-blue);
            overflow-y: auto;
            text-align: left;
            border-radius: 4px;
        }
        .error-msg {
            color: #ff0055;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        footer {
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            padding: 20px;
            text-align: center;
            font-size: 14px;
            background: var(--panel-bg);
            color: rgba(192, 192, 192, 0.6);
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">NXCHAT</a>
        <div class="nav-right">
            <a href="/about" class="nav-btn" data-i18n="nav_about">About</a>
            <div class="lang-container">
                <button class="lang-btn" onclick="toggleLang()">
                    <span>🌐</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button onclick="changeLang('en')">English</button>
                    <button onclick="changeLang('zh')">繁體中文</button>
                    <button onclick="changeLang('ja')">日本語</button>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="form-card">
            <h2 class="form-title" data-i18n="create_title">CREATE INTERFACE</h2>
            
            <div class="form-group">
                <label data-i18n="label_room_name">ROOM NAME (MAX 20)</label>
                <input type="text" id="roomName" class="form-control" maxlength="20" placeholder="CYBER_NEST">
                <div class="error-msg" id="nameError"></div>
            </div>

            <div class="form-group">
                <label data-i18n="label_room_id">4-CHARACTER ROOM ID (ALPHANUMERIC)</label>
                <input type="text" id="roomId" class="form-control" maxlength="4" placeholder="e4b6">
                <div class="error-msg" id="idError"></div>
            </div>

            <div class="form-group">
                <label data-i18n="label_duration">DURATION</label>
                <select id="duration" class="form-control">
                    <option value="30">30 min</option>
                    <option value="60" selected>60 min</option>
                    <option value="120">120 min</option>
                    <option value="480">480 min</option>
                    <option value="720">720 min</option>
                    <option value="1440">1440 min</option>
                </select>
            </div>

            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="aiEnabled">
                    <span data-i18n="label_ai">ACTIVATE INTEGRATED AI PARTICIPANT</span>
                </label>
            </div>

            <button class="submit-btn" onclick="initializeRoom()" data-i18n="btn_initialize">INITIALIZE SOCKET</button>

            <div class="pow-overlay" id="powOverlay">
                <div class="pow-text" data-i18n="pow_computing">RUNNING CRYPTOGRAPHIC PROOF OF WORK...</div>
                <div class="pow-terminal" id="powTerminal"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NeuralNexusLab. <span data-i18n="footer_rights">All rights reserved.</span></p>
    </footer>

    <script>
        const i18n = {
            en: {
                nav_about: "About",
                create_title: "CREATE INTERFACE",
                label_room_name: "ROOM NAME (MAX 20)",
                label_room_id: "4-CHARACTER ROOM ID (ALPHANUMERIC)",
                label_duration: "DURATION",
                label_ai: "ACTIVATE INTEGRATED AI PARTICIPANT",
                btn_initialize: "INITIALIZE SOCKET",
                pow_computing: "RUNNING CRYPTOGRAPHIC PROOF OF WORK...",
                footer_rights: "All rights reserved.",
                err_empty: "This parameter is required",
                err_id_format: "Must be exactly 4 alphanumeric characters",
                err_generic: "An error occurred. ID might be in use or expired."
            },
            zh: {
                nav_about: "關於專案",
                create_title: "創建聊天室",
                label_room_name: "聊天室名稱 (最多20字)",
                label_room_id: "4位數代碼 (限英文字母或數字)",
                label_duration: "存續時間",
                label_ai: "啟用 AI 協同通訊功能",
                btn_initialize: "初始化實體通訊",
                pow_computing: "正在執行瀏覽器真人算力驗證 (PoW)...",
                footer_rights: "版權所有。",
                err_empty: "此欄位必填",
                err_id_format: "必須是4位英數組合",
                err_generic: "伺服器初始化失敗，ID 可能已重複使用。"
            },
            ja: {
                nav_about: "アバウト",
                create_title: "ルーム新規作成",
                label_room_name: "ルーム名 (最大20文字)",
                label_room_id: "4桁のルームID (英数字のみ)",
                label_duration: "制限時間",
                label_ai: "チャットAIのアクティベート",
                btn_initialize: "通信路を初期化",
                pow_computing: "ブラウザ人間証明(Proof of Work)を実行中...",
                footer_rights: "不許複製・禁無断転載。",
                err_empty: "入力必須項目です",
                err_id_format: "4文字の半角英数字で入力してください",
                err_generic: "作成失敗。IDが重複している可能性があります。"
            }
        };

        function toggleLang() {
            const dropdown = document.getElementById('langDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function changeLang(lang) {
            localStorage.setItem('nxchat_lang', lang);
            applyLanguage(lang);
            document.getElementById('langDropdown').style.display = 'none';
        }

        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
        }

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function logTerminal(text) {
            const term = document.getElementById('powTerminal');
            term.innerHTML += `> ${text}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        async function initializeRoom() {
            const lang = localStorage.getItem('nxchat_lang') || 'en';
            const nameEl = document.getElementById('roomName');
            const idEl = document.getElementById('roomId');
            const durationEl = document.getElementById('duration');
            const aiEl = document.getElementById('aiEnabled');

            const nameErr = document.getElementById('nameError');
            const idErr = document.getElementById('idError');

            nameErr.style.display = 'none';
            idErr.style.display = 'none';

            let valid = true;

            if (!nameEl.value.trim()) {
                nameErr.textContent = i18n[lang].err_empty;
                nameErr.style.display = 'block';
                valid = false;
            }
            if (!/^[a-zA-Z0-9]{4}$/.test(idEl.value)) {
                idErr.textContent = i18n[lang].err_id_format;
                idErr.style.display = 'block';
                valid = false;
            }

            if (!valid) return;

            const powOverlay = document.getElementById('powOverlay');
            powOverlay.style.display = 'flex';
            const term = document.getElementById('powTerminal');
            term.innerHTML = '';

            const txId = Math.random().toString(36).substring(2) + Date.now().toString(36);
            logTerminal(`INITIALIZING VERIFICATION TRANSCTION: ${txId}`);

            try {
                logTerminal('ACQUIRING CHALLENGE PART 1/3...');
                const res1 = await fetch(`/api/pow/step1?txId=${txId}`);
                const data1 = await res1.json();
                logTerminal(`PART 1 ACQUIRED: ${data1.s1.substring(0, 6)}...`);

                logTerminal('ACQUIRING CHALLENGE PART 2/3...');
                const res2 = await fetch(`/api/pow/step2?txId=${txId}`);
                const data2 = await res2.json();
                logTerminal(`PART 2 ACQUIRED: ${data2.s2.substring(0, 6)}...`);

                logTerminal('ACQUIRING CHALLENGE PART 3/3...');
                const res3 = await fetch(`/api/pow/step3?txId=${txId}`);
                const data3 = await res3.json();
                logTerminal(`PART 3 ACQUIRED: ${data3.s3.substring(0, 6)}...`);

                logTerminal('RUNNING SHA-256 PROOF INTEGRITY FORMULA...');
                const rawString = data1.s1 + data2.s2 + data3.s3;
                const powKey = await sha256(rawString);
                logTerminal(`INTEGRITY PROVED: ${powKey.substring(0, 12)}...`);

                logTerminal('SUBMITTING PROTOCOL ALLOCATION REQUEST...');
                
                const response = await fetch('/api/room/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        txId,
                        powKey,
                        id: idEl.value,
                        name: nameEl.value,
                        duration: durationEl.value,
                        aiEnabled: aiEl.checked
                    })
                });

                const finalData = await response.json();
                if (response.ok && finalData.success) {
                    logTerminal('ALLOCATION GRANTED. RE-ROUTING TO TARGET GATEWAY...');
                    setTimeout(() => {
                        window.location.href = `/room/${idEl.value}`;
                    }, 1000);
                } else {
                    powOverlay.style.display = 'none';
                    idErr.textContent = finalData.error || i18n[lang].err_generic;
                    idErr.style.display = 'block';
                }

            } catch (err) {
                powOverlay.style.display = 'none';
                idErr.textContent = i18n[lang].err_generic;
                idErr.style.display = 'block';
            }
        }

        const initialLang = localStorage.getItem('nxchat_lang') || 'en';
        applyLanguage(initialLang);
    </script>
</body>
</html>
