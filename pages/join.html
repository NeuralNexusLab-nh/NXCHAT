<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXCHAT // ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff00;
            --cyber-blue: #00f0ff;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --text-color: #c0c0c0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Share Tech Mono', monospace;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
        header {
            border-bottom: 2px solid var(--neon-green);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.15);
        }
        .logo {
            font-size: 24px;
            color: var(--neon-green);
            text-decoration: none;
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .logo:hover {
            color: var(--cyber-blue);
            text-shadow: 0 0 15px var(--cyber-blue);
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-btn {
            color: var(--cyber-blue);
            text-decoration: none;
            border: 1px solid var(--cyber-blue);
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
        }
        .nav-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px var(--cyber-blue);
            transform: translateY(-2px);
        }
        .lang-container {
            position: relative;
            display: inline-block;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px var(--neon-green);
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            z-index: 1000;
            min-width: 120px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }
        .lang-dropdown button {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-dropdown button:hover {
            background: rgba(0, 255, 0, 0.2);
            color: var(--neon-green);
        }
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .join-card {
            background: var(--panel-bg);
            border: 1px solid var(--cyber-blue);
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.1);
        }
        .join-title {
            font-size: 28px;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px var(--cyber-blue);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            color: var(--neon-green);
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            background: #000;
            border: 1px solid rgba(0, 255, 0, 0.5);
            padding: 12px;
            color: var(--cyber-blue);
            font-size: 24px;
            text-align: center;
            border-radius: 4px;
            outline: none;
            letter-spacing: 4px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--cyber-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px solid var(--cyber-blue);
            color: var(--cyber-blue);
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1.5px;
        }
        .submit-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px var(--cyber-blue);
        }
        .hacker-alert {
            background: #1a0008;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
            display: none;
        }
        footer {
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            padding: 20px;
            text-align: center;
            font-size: 14px;
            background: var(--panel-bg);
            color: rgba(192, 192, 192, 0.6);
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">NXCHAT</a>
        <div class="nav-right">
            <a href="/about" class="nav-btn" data-i18n="nav_about">About</a>
            <div class="lang-container">
                <button class="lang-btn" onclick="toggleLang()">
                    <span>🌐</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button onclick="changeLang('en')">English</button>
                    <button onclick="changeLang('zh')">繁體中文</button>
                    <button onclick="changeLang('ja')">日本語</button>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="join-card">
            <h2 class="join-title" data-i18n="join_title">SOCKET ACCESS</h2>
            
            <div class="hacker-alert" id="errorAlert"></div>

            <div class="form-group">
                <label data-i18n="label_id">ENTER 4-DIGIT ID</label>
                <input type="text" id="targetId" class="form-control" maxlength="4" placeholder="ABCD" onkeydown="handleEnter(event)">
            </div>

            <button class="submit-btn" onclick="joinRoom()" data-i18n="btn_connect">ESTABLISH GATEWAY</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NeuralNexusLab. <span data-i18n="footer_rights">All rights reserved.</span></p>
    </footer>

    <script>
        const i18n = {
            en: {
                nav_about: "About",
                join_title: "SOCKET ACCESS",
                label_id: "ENTER 4-DIGIT ID",
                btn_connect: "ESTABLISH GATEWAY",
                footer_rights: "All rights reserved.",
                err_expired: "ACCESS DENIED: CHATROOM DELETED, EXPIRED OR NEVER EXISTED.",
                err_empty: "ERROR: CHATROOM ID CANNOT BE BLANK.",
                err_format: "ERROR: CHATROOM ID FORMAT INCORRECT."
            },
            zh: {
                nav_about: "關於專案",
                join_title: "加入聊天室",
                label_id: "請輸入 4 位數聊天室 ID",
                btn_connect: "連結閘道",
                footer_rights: "版權所有。",
                err_expired: "拒絕訪問：該聊天室已過期銷毀、或從不存在。",
                err_empty: "錯誤：代碼不可為空。",
                err_format: "錯誤：代碼格式不正確。"
            },
            ja: {
                nav_about: "アバウト",
                join_title: "ルーム接続",
                label_id: "4桁のルームIDを入力",
                btn_connect: "通信を開始",
                footer_rights: "不許複製・禁無断転載。",
                err_expired: "接続拒否：該当ルームは存在しないか、時間経過で消滅しました。",
                err_empty: "エラー：IDを入力してください。",
                err_format: "エラー：IDのフォーマットが正しくありません。"
            }
        };

        function toggleLang() {
            const dropdown = document.getElementById('langDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function changeLang(lang) {
            localStorage.setItem('nxchat_lang', lang);
            applyLanguage(lang);
            document.getElementById('langDropdown').style.display = 'none';
        }

        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            checkParams();
        }

        function checkParams() {
            const params = new URLSearchParams(window.location.search);
            const lang = localStorage.getItem('nxchat_lang') || 'en';
            const alertEl = document.getElementById('errorAlert');

            if (params.get('error') === 'expired_or_not_found') {
                alertEl.textContent = i18n[lang].err_expired;
                alertEl.style.display = 'block';
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') joinRoom();
        }

        function joinRoom() {
            const lang = localStorage.getItem('nxchat_lang') || 'en';
            const target = document.getElementById('targetId').value.trim();
            const alertEl = document.getElementById('errorAlert');
            alertEl.style.display = 'none';

            if (!target) {
                alertEl.textContent = i18n[lang].err_empty;
                alertEl.style.display = 'block';
                return;
            }

            if (!/^[a-zA-Z0-9]{4}$/.test(target)) {
                alertEl.textContent = i18n[lang].err_format;
                alertEl.style.display = 'block';
                return;
            }

            window.location.href = `/room/${target}`;
        }

        const initialLang = localStorage.getItem('nxchat_lang') || 'en';
        applyLanguage(initialLang);
    </script>
</body>
</html>
