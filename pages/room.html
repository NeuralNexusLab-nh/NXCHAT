<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXCHAT // CHATROOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff00;
            --cyber-blue: #00f0ff;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --text-color: #c0c0c0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Share Tech Mono', monospace;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
        header {
            border-bottom: 2px solid var(--cyber-blue);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            flex-shrink: 0;
        }
        .logo {
            font-size: 20px;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .timer {
            color: var(--cyber-blue);
            text-shadow: 0 0 8px var(--cyber-blue);
            font-size: 16px;
        }
        .btn-exit {
            color: #ff0055;
            border: 1px solid #ff0055;
            background: transparent;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-exit:hover {
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 12px #ff0055;
        }
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #080808;
        }
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 75%;
        }
        .message-row.self {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-row.other {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }
        .self .avatar {
            background-color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }
        .other .avatar {
            background-color: var(--cyber-blue);
            box-shadow: 0 0 10px var(--cyber-blue);
        }
        .bubble-wrap {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sender-name {
            font-size: 11px;
            color: rgba(192, 192, 192, 0.6);
        }
        .self .sender-name {
            text-align: right;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-all;
        }
        .self .bubble {
            background: rgba(0, 255, 0, 0.08);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.05);
        }
        .other .bubble {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid var(--cyber-blue);
            color: var(--cyber-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.05);
        }
        .system-message {
            align-self: center;
            color: rgba(192, 192, 192, 0.5);
            font-size: 13px;
            text-align: center;
            padding: 5px 20px;
            max-width: 90%;
            word-break: break-all;
        }
        .input-bar {
            border-top: 2px solid var(--cyber-blue);
            padding: 15px;
            background: var(--panel-bg);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            background: #000;
            border: 1px solid var(--cyber-blue);
            color: var(--cyber-blue);
            font-size: 16px;
            padding: 12px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
        }
        .input-bar input:focus {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        .btn-send {
            background: transparent;
            border: 2px solid var(--cyber-blue);
            color: var(--cyber-blue);
            padding: 0 24px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-send:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-card {
            background: var(--panel-bg);
            border: 1px solid var(--cyber-blue);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25);
            text-align: center;
        }
        .modal-card h3 {
            color: var(--cyber-blue);
            font-size: 22px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .modal-card input {
            width: 100%;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-card button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .modal-card button:hover {
            background: rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 15px var(--neon-green);
        }
        .local-warning {
            color: #ff0055;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" id="roomLogo">NXCHAT // ROOM</div>
        <div class="header-right">
            <div class="timer" id="roomTimer">REMAINING: --:--:--</div>
            <button class="btn-exit" onclick="exitRoom()" data-i18n="btn_exit">EXIT</button>
        </div>
    </header>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="TRANSMIT SECURE DATA (USE @AI TO CALL ASSISTANT)..." maxlength="200" onkeydown="handleSendKey(event)">
        <button class="btn-send" onclick="sendMessage()" data-i18n="btn_send">TRANSMIT</button>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-card">
            <h3 data-i18n="modal_title">INITIALIZE COGNITIVE PROFILE</h3>
            <input type="text" id="nicknameInput" maxlength="20" placeholder="HACKER_1" onkeydown="handleModalKey(event)">
            <button onclick="saveNickname()" data-i18n="modal_btn">ESTABLISH SOCKET</button>
            <div class="local-warning" id="modalError"></div>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                btn_exit: "EXIT",
                btn_send: "TRANSMIT",
                modal_title: "INITIALIZE COGNITIVE PROFILE",
                modal_btn: "ESTABLISH SOCKET",
                joined_msg: "joined the channel.",
                cooldown: "PLEASE COOLDOWN (COOLDOWN RESET PUNISHMENT ACTIVE)",
                placeholder: "TRANSMIT SECURE DATA (USE @AI TO CALL ASSISTANT)..."
            },
            zh: {
                btn_exit: "離開",
                btn_send: "發送",
                modal_title: "設定個人暱稱",
                modal_btn: "進入通訊管道",
                joined_msg: "進入了頻道。",
                cooldown: "請勿頻繁發送，3秒限制已被懲罰重置！",
                placeholder: "發送加密訊息 (可使用 @ai 呼叫助理)..."
            },
            ja: {
                btn_exit: "退出",
                btn_send: "送信",
                modal_title: "プロフィール名決定",
                modal_btn: "接続開始",
                joined_msg: "がチャンネルに参加しました。",
                cooldown: "送信間隔が早すぎます。クールダウンがリセットされました。",
                placeholder: "暗号化データを送信 (@ai でアシスタントを呼び出し)..."
            }
        };

        const roomId = window.location.pathname.split('/').pop();
        let nickname = "";
        let expiryTime = 0;
        let messageCount = 0;
        let isTabActive = true;
        let unreadCount = 0;
        let originalTitle = `NXCHAT // ${roomId.toUpperCase()}`;
        let lang = localStorage.getItem('nxchat_lang') || 'en';

        document.title = originalTitle;

        window.addEventListener('focus', () => {
            isTabActive = true;
            unreadCount = 0;
            document.title = originalTitle;
        });

        window.addEventListener('blur', () => {
            isTabActive = false;
        });

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            const input = document.getElementById('msgInput');
            if (i18n[lang] && i18n[lang].placeholder) {
                input.placeholder = i18n[lang].placeholder;
            }
        }

        function handleModalKey(e) {
            if (e.key === 'Enter') saveNickname();
        }

        function handleSendKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function loadMetadata() {
            try {
                const res = await fetch(`/metadata/${roomId}`);
                if (!res.ok) {
                    window.location.href = '/join?error=expired_or_not_found';
                    return;
                }
                const data = await res.json();
                expiryTime = data.expiry;
                document.getElementById('roomLogo').textContent = `NXCHAT // ${data.name.substring(0, 20).toUpperCase()}`;
                originalTitle = `NXCHAT // ${data.name.toUpperCase()}`;
                startCountdown();
            } catch (err) {
                window.location.href = '/join?error=expired_or_not_found';
            }
        }

        function startCountdown() {
            setInterval(() => {
                const now = Date.now();
                const diff = expiryTime - now;
                if (diff <= 0) {
                    window.location.href = '/join?error=expired_or_not_found';
                    return;
                }
                const hrs = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const mins = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('roomTimer').textContent = `REMAINING: ${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function saveNickname() {
            const input = document.getElementById('nicknameInput');
            const val = input.value.trim();
            const err = document.getElementById('modalError');

            if (!val) {
                err.textContent = "NICKNAME CANNOT BE BLANK.";
                err.style.display = 'block';
                return;
            }

            nickname = val.substring(0, 20);
            localStorage.setItem(`${roomId}_name`, nickname);
            document.getElementById('nameModal').style.display = 'none';

            fetch(`/api/message/${roomId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: "System",
                    msg: `${nickname} ${i18n[lang].joined_msg}`,
                    isSystem: true
                })
            }).then(() => pollMessages());
        }

        async function pollMessages() {
            try {
                const res = await fetch(`/msgl/${roomId}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.count > messageCount) {
                    await fetchAndRender();
                }
            } catch (err) {}
            setTimeout(pollMessages, 1000);
        }

        async function fetchAndRender() {
            try {
                const res = await fetch(`/msgs/${roomId}`);
                if (!res.ok) return;
                const messages = await res.json();
                const container = document.getElementById('chatContainer');
                
                let isScrolled = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                let originalCount = messageCount;
                messageCount = messages.length;

                container.innerHTML = '';
                messages.forEach(m => {
                    if (m.isSystem) {
                        const sysDiv = document.createElement('div');
                        sysDiv.className = 'system-message';
                        sysDiv.textContent = m.msg;
                        container.appendChild(sysDiv);
                    } else {
                        const row = document.createElement('div');
                        const isSelf = m.name === nickname;
                        row.className = `message-row ${isSelf ? 'self' : 'other'}`;

                        const avatar = document.createElement('div');
                        avatar.className = 'avatar';
                        avatar.textContent = m.name.charAt(0).toUpperCase();

                        const wrap = document.createElement('div');
                        wrap.className = 'bubble-wrap';

                        const nameEl = document.createElement('div');
                        nameEl.className = 'sender-name';
                        nameEl.textContent = m.name;

                        const bubble = document.createElement('div');
                        bubble.className = 'bubble';
                        bubble.textContent = m.msg;

                        wrap.appendChild(nameEl);
                        wrap.appendChild(bubble);

                        row.appendChild(avatar);
                        row.appendChild(wrap);
                        container.appendChild(row);
                    }
                });

                if (originalCount > 0 && messages.length > originalCount) {
                    if (!isTabActive) {
                        unreadCount += (messages.length - originalCount);
                        document.title = `(${unreadCount}) ${originalTitle}`;
                    }
                }

                if (isScrolled || originalCount === 0) {
                    container.scrollTop = container.scrollHeight;
                }
            } catch (err) {}
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            try {
                const res = await fetch(`/api/message/${roomId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nickname,
                        msg: text,
                        isSystem: false
                    })
                });

                if (res.status === 429) {
                    showLocalNotification(i18n[lang].cooldown);
                } else if (res.ok) {
                    await fetchAndRender();
                }
            } catch (err) {}
        }

        function showLocalNotification(text) {
            const container = document.getElementById('chatContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = 'system-message';
            alertDiv.style.color = '#ff0055';
            alertDiv.style.textShadow = '0 0 5px rgba(255,0,85,0.5)';
            alertDiv.textContent = text;
            container.appendChild(alertDiv);
            container.scrollTop = container.scrollHeight;
        }

        function exitRoom() {
            window.location.href = '/';
        }

        applyLanguage();
        loadMetadata();

        const storedName = localStorage.getItem(`${roomId}_name`);
        if (storedName) {
            nickname = storedName;
            document.getElementById('nameModal').style.display = 'none';
            pollMessages();
        }
    </script>
</body>
</html>
